<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>betl pipeline viewer</title>
<script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@dagrejs/dagre@1.1.4/dist/dagre.min.js"></script>
<style>
  :root {
    --bg:          #fafafa;
    --panel:       #ffffff;
    --line:        #e6e6e6;
    --line-strong: #c8c8c8;
    --text:        #222;
    --muted:       #8a8a8a;
    --head-bg:     #f5f5f7;
    --hover:       #f3f4f6;
    --badge-bg:    #eef2ff;
    --badge-fg:    #4338ca;
    --overlay:     rgba(0, 0, 0, 0.35);
    --accent:      #2563eb;
    --df:          #8b5cf6;
    --sql:         #14b8a6;
    --map:         #f59e0b;
    --script:      #ef4444;
    --container:   #6b7280;
    --leaf:        #94a3b8;
    --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  body.dark {
    --bg:          #0f1115;
    --panel:       #181b20;
    --line:        #262a31;
    --line-strong: #3a3f48;
    --text:        #e7e7e7;
    --muted:       #8a8f99;
    --head-bg:     #1f242c;
    --hover:       #252a32;
    --badge-bg:    #1e1b3a;
    --badge-fg:    #a5b4fc;
    --overlay:     rgba(0, 0, 0, 0.55);
    --df:          #a78bfa;
    --sql:         #2dd4bf;
    --map:         #fbbf24;
    --script:      #f87171;
    --container:   #9ca3af;
    --leaf:        #94a3b8;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font: 13px/1.45 -apple-system, "Segoe UI", system-ui, sans-serif;
  }
  header {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 14px;
    background: var(--panel);
    border-bottom: 1px solid var(--line);
    position: sticky; top: 0; z-index: 10;
    flex-wrap: wrap;
  }
  header h1 {
    margin: 0; font-size: 13px; font-weight: 600;
    font-family: var(--mono);
    color: var(--muted);
  }
  header h1 .name { color: var(--text); }
  .spacer { flex: 1; }
  button.btn, label.btn {
    border: 1px solid var(--line-strong);
    border-radius: 6px;
    background: var(--panel);
    color: var(--text);
    padding: 5px 10px;
    cursor: pointer;
    font-size: 12px;
    line-height: 1;
  }
  button.btn:hover, label.btn:hover { background: var(--hover); }
  button.btn:disabled, label.btn.disabled {
    color: var(--muted); cursor: not-allowed; opacity: 0.55;
  }
  button.btn:disabled:hover { background: var(--panel); }
  .toggle { display: flex; border: 1px solid var(--line-strong); border-radius: 6px; overflow: hidden; }
  .toggle button {
    border: 0; background: var(--panel); color: var(--text);
    padding: 5px 11px; cursor: pointer; font-size: 12px; line-height: 1;
  }
  .toggle button + button { border-left: 1px solid var(--line-strong); }
  .toggle button.active { background: var(--accent); color: white; }
  .toggle button:not(.active):hover { background: var(--hover); }
  main { padding: 14px; }

  /* ----------- connection arrows ----------- */
  .v-ribbon .children,
  .v-detail .pane-children,
  .v-detail .dataflow-children,
  .v-kanban .col-children { position: relative; }
  .conns {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    overflow: visible;
    z-index: 0;
  }
  .conns path { fill: none; stroke: var(--muted); stroke-width: 1.5; }
  .conns .arrow-head { fill: var(--muted); }
  .conns .edge-label-bg {
    fill: var(--panel);
    stroke: var(--line);
    stroke-width: 1;
  }
  .conns .edge-label {
    fill: var(--text);
    font-family: var(--mono);
    font-size: 11px;
  }
  .step { position: relative; z-index: 1; transition: width 0.18s ease; }
  /* Cards that sit between a link's source and target shrink and
   * anchor left, freeing a fixed-width right-side lane the arrow can
   * run straight down. Width is forced (not max-width) so the lane has
   * a predictable size regardless of content length. */
  .step.blocker {
    align-self: flex-start;
    width: calc(100% - 80px);
  }

  /* ----------- shared: step card ----------- */
  .step {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 9px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-left: 3px solid var(--leaf);
    border-radius: 4px;
    font-family: var(--mono);
    font-size: 12px;
    min-height: 28px;
  }
  .step.k-container   { border-left-color: var(--container); }
  .step.k-dataflow    { border-left-color: var(--df); }
  .step.k-sql         { border-left-color: var(--sql); }
  .step.k-map         { border-left-color: var(--map); }
  .step.k-script      { border-left-color: var(--script); }
  .step .id { font-weight: 600; }
  .step .ttype { color: var(--muted); font-size: 11px; }
  .step .badge {
    margin-left: auto;
    background: var(--badge-bg);
    color: var(--badge-fg);
    border-radius: 10px;
    padding: 1px 7px;
    font-size: 11px;
    font-weight: 500;
  }
  .step .after { color: var(--muted); font-size: 11px; }
  .step .after::before { content: '\2190 '; }

  /* ----------- RIBBON ----------- */
  .v-ribbon section {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .v-ribbon .section-head {
    display: flex; align-items: baseline; gap: 12px;
    padding: 9px 14px;
    background: var(--head-bg);
    border-bottom: 1px solid var(--line);
  }
  .v-ribbon .section-head .id {
    font-family: var(--mono);
    font-weight: 600;
    font-size: 13px;
  }
  .v-ribbon .section-head .meta {
    color: var(--muted);
    font-size: 11px;
    font-family: var(--mono);
  }
  .v-ribbon .section-head .after-tag {
    color: var(--muted);
    font-family: var(--mono);
    font-size: 11px;
    margin-left: auto;
  }
  .v-ribbon .section-head .after-tag::before { content: '\2190 '; }
  .v-ribbon .children {
    padding: 10px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 18px;
  }
  .v-ribbon .empty {
    padding: 10px 14px;
    color: var(--muted);
    font-style: italic;
    font-size: 12px;
  }

  /* ----------- MASTER-DETAIL ----------- */
  .v-detail {
    display: grid;
    grid-template-columns: 240px 1fr;
    gap: 12px;
    min-height: calc(100vh - 80px);
  }
  .v-detail .rail {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 6px;
    align-self: start;
    position: sticky;
    top: 60px;
    max-height: calc(100vh - 80px);
    overflow-y: auto;
  }
  .v-detail .rail-item {
    padding: 7px 9px;
    border-radius: 4px;
    cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    font-family: var(--mono);
    font-size: 12px;
  }
  .v-detail .rail-item + .rail-item { margin-top: 2px; }
  .v-detail .rail-item:hover:not(.active) { background: var(--hover); }
  .v-detail .rail-item.active { background: var(--accent); color: white; }
  .v-detail .rail-item .count {
    margin-left: auto;
    font-size: 11px;
    color: var(--muted);
  }
  .v-detail .rail-item.active .count { color: rgba(255,255,255,.85); }
  .v-detail .pane {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 14px;
  }
  .v-detail .pane-head {
    border-bottom: 1px solid var(--line);
    padding-bottom: 10px;
    margin-bottom: 12px;
  }
  .v-detail .pane-head .id {
    font-family: var(--mono);
    font-weight: 700;
    font-size: 16px;
  }
  .v-detail .pane-head .meta {
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
    margin-top: 3px;
  }
  .v-detail .pane-children {
    display: flex; flex-direction: column; gap: 18px;
  }
  .v-detail .dataflow-children {
    margin: 4px 0 8px 18px;
    padding: 6px 8px;
    border-left: 2px dashed var(--df);
    display: flex; flex-direction: column; gap: 16px;
  }

  /* ----------- KANBAN ----------- */
  .v-kanban {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    padding-bottom: 10px;
  }
  .v-kanban .col {
    min-width: 260px; max-width: 260px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    display: flex; flex-direction: column;
    max-height: calc(100vh - 90px);
  }
  .v-kanban .col-head {
    padding: 9px 11px;
    background: var(--head-bg);
    border-bottom: 1px solid var(--line);
    border-radius: 8px 8px 0 0;
    font-family: var(--mono);
  }
  .v-kanban .col-head .id { font-weight: 600; font-size: 13px; }
  .v-kanban .col-head .meta { color: var(--muted); font-size: 11px; margin-top: 2px; }
  .v-kanban .col-head .after-tag {
    color: var(--muted);
    font-size: 11px;
    margin-top: 2px;
    font-family: var(--mono);
  }
  .v-kanban .col-head .after-tag::before { content: '\2190 '; }
  .v-kanban .col-children {
    padding: 8px;
    display: flex; flex-direction: column; gap: 18px;
    overflow-y: auto;
  }
  .v-kanban .empty {
    padding: 10px;
    color: var(--muted);
    font-style: italic;
    font-size: 12px;
  }

  /* ----------- FLOW (dagre-laid-out graph per dataflow) ----------- */
  .v-flow .flow-section {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .v-flow .flow-head {
    display: flex; align-items: baseline; gap: 12px;
    padding: 9px 14px;
    background: var(--head-bg);
    border-bottom: 1px solid var(--line);
  }
  .v-flow .flow-head .id {
    font-family: var(--mono); font-weight: 600; font-size: 13px;
  }
  .v-flow .flow-head .meta {
    color: var(--muted); font-family: var(--mono); font-size: 11px;
  }
  /* Canvas is a positioning context; dagre fills width/height inline.
   * Cards measure at their natural inline-flex size before being
   * absolute-positioned by applyFlowLayout(). */
  .v-flow .flow-canvas {
    position: relative;
    overflow: auto;
  }
  .v-flow .flow-canvas .step {
    display: inline-flex;
  }
  .v-flow .empty {
    padding: 10px 14px;
    color: var(--muted);
    font-style: italic;
    font-size: 12px;
  }

  /* ----------- path crumb in header ----------- */
  .pathcrumb {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 40vw;
  }
  .pathcrumb .dirty::after { content: ' *'; color: var(--map); }

  /* ----------- modal ----------- */
  .modal {
    position: fixed; inset: 0;
    background: var(--overlay);
    display: none;
    align-items: flex-start; justify-content: center;
    padding-top: 8vh;
    z-index: 200;
  }
  .modal.show { display: flex; }
  .modal-card {
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--line);
    border-radius: 10px;
    width: min(640px, 92vw);
    max-height: 80vh;
    display: flex; flex-direction: column;
    box-shadow: 0 12px 40px rgba(0,0,0,0.25);
  }
  .modal-head {
    padding: 11px 14px;
    border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 10px;
  }
  .modal-head h3 {
    margin: 0; font-size: 13px; font-weight: 600;
    font-family: var(--mono);
  }
  .modal-head .close {
    margin-left: auto;
    border: 0; background: transparent; cursor: pointer;
    color: var(--muted); font-size: 18px; line-height: 1;
    padding: 2px 6px; border-radius: 4px;
  }
  .modal-head .close:hover { background: var(--hover); color: var(--text); }
  .modal-body { padding: 10px 14px; overflow-y: auto; }
  .modal-foot {
    padding: 10px 14px;
    border-top: 1px solid var(--line);
    display: flex; gap: 8px; justify-content: flex-end;
  }
  .modal-foot .btn.primary {
    background: var(--accent); color: white; border-color: var(--accent);
  }
  .modal-foot .btn.primary:hover { background: var(--accent); filter: brightness(1.1); }

  .bcrumb {
    font-family: var(--mono); font-size: 12px;
    padding: 4px 0 8px;
    color: var(--muted);
  }
  .bcrumb .root { color: var(--text); font-weight: 600; }
  .entries { display: flex; flex-direction: column; gap: 2px; }
  .entry {
    padding: 6px 10px;
    border-radius: 5px;
    cursor: pointer;
    font-family: var(--mono); font-size: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .entry:hover { background: var(--hover); }
  .entry .icon { width: 16px; text-align: center; color: var(--muted); }
  .entry.dir .name { font-weight: 500; }
  .entry .size { margin-left: auto; color: var(--muted); font-size: 11px; }

  .saveform { display: flex; flex-direction: column; gap: 8px; }
  .saveform label { font-size: 12px; color: var(--muted); }
  .saveform input {
    border: 1px solid var(--line-strong);
    background: var(--bg);
    color: var(--text);
    border-radius: 5px;
    padding: 7px 10px;
    font-family: var(--mono);
    font-size: 12px;
    outline: none;
  }
  .saveform input:focus { border-color: var(--accent); }
  .saveform .hint { font-size: 11px; color: var(--muted); }
  .saveform .err { color: var(--script); }

  /* ----------- toast ----------- */
  .toast {
    position: fixed;
    bottom: 22px;
    left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--text); color: var(--bg);
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 12px;
    z-index: 300;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    box-shadow: 0 6px 20px rgba(0,0,0,0.25);
    font-family: var(--mono);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.err { background: var(--script); color: white; }

  /* ----------- step click affordances ----------- */
  [data-path] { cursor: pointer; }
  [data-path]:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 1px;
  }
  .step[data-path]:hover { background: var(--hover); }
  .step[data-path].selected {
    background: var(--hover);
    box-shadow: inset 0 0 0 1px var(--accent);
  }
  .section-head[data-path], .col-head[data-path], .pane-head[data-path] {
    border-left: 3px solid var(--leaf);
  }
  .section-head[data-path].k-container, .col-head[data-path].k-container, .pane-head[data-path].k-container { border-left-color: var(--container); }
  .section-head[data-path].k-dataflow,  .col-head[data-path].k-dataflow,  .pane-head[data-path].k-dataflow  { border-left-color: var(--df); }
  .section-head[data-path].k-sql,       .col-head[data-path].k-sql,       .pane-head[data-path].k-sql       { border-left-color: var(--sql); }
  .section-head[data-path].k-map,       .col-head[data-path].k-map,       .pane-head[data-path].k-map       { border-left-color: var(--map); }
  .section-head[data-path].k-script,    .col-head[data-path].k-script,    .pane-head[data-path].k-script    { border-left-color: var(--script); }
  .section-head[data-path]:hover, .col-head[data-path]:hover, .pane-head[data-path]:hover {
    filter: brightness(0.97);
  }
  body.dark .section-head[data-path]:hover, body.dark .col-head[data-path]:hover, body.dark .pane-head[data-path]:hover {
    filter: brightness(1.15);
  }

  /* ----------- inspector ----------- */
  .inspector {
    position: fixed;
    top: 50px; right: 0; bottom: 0;
    width: min(400px, 92vw);
    background: var(--panel);
    border-left: 1px solid var(--line);
    display: flex; flex-direction: column;
    transform: translateX(100%);
    transition: transform 0.18s ease-out;
    z-index: 80;
    box-shadow: -4px 0 16px rgba(0,0,0,0.08);
  }
  .inspector.show { transform: translateX(0); }
  .inspector .ins-head {
    padding: 10px 12px;
    border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 10px;
  }
  .inspector .ins-head .crumb {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
  }
  .inspector .ins-head .crumb .arrow { margin: 0 4px; opacity: 0.6; }
  .inspector .ins-head .crumb .tail  { color: var(--text); font-weight: 600; }
  .inspector .ins-head button.close {
    border: 0; background: transparent; cursor: pointer;
    color: var(--muted); font-size: 18px; line-height: 1;
    padding: 2px 6px; border-radius: 4px;
  }
  .inspector .ins-head button.close:hover { background: var(--hover); color: var(--text); }
  .inspector .ins-body {
    padding: 12px;
    overflow-y: auto;
    flex: 1;
    display: flex; flex-direction: column; gap: 10px;
  }
  .inspector .ins-foot {
    padding: 10px 12px;
    border-top: 1px solid var(--line);
    display: flex; gap: 8px; justify-content: flex-end;
  }
  .field { display: flex; flex-direction: column; gap: 3px; }
  .field label {
    font-family: var(--mono); font-size: 11px;
    color: var(--muted);
    display: flex; align-items: center; gap: 6px;
  }
  .field label .kindtag {
    background: var(--badge-bg); color: var(--badge-fg);
    padding: 1px 6px; border-radius: 10px; font-size: 10px;
    font-weight: 500;
  }
  .field input, .field textarea {
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--line-strong);
    border-radius: 5px;
    padding: 6px 8px;
    font-family: var(--mono); font-size: 12px;
    outline: none;
    resize: vertical;
    width: 100%;
  }
  .field input:focus, .field textarea:focus { border-color: var(--accent); }
  .nested-list {
    display: flex; flex-direction: column; gap: 3px;
    border: 1px dashed var(--line-strong);
    border-radius: 5px;
    padding: 6px;
  }
  .nested-link {
    padding: 5px 8px;
    border-radius: 4px;
    cursor: pointer;
    font-family: var(--mono); font-size: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .nested-link:hover { background: var(--hover); }
  .nested-link .nl-id { font-weight: 600; }
  .nested-link .nl-type { color: var(--muted); font-size: 11px; }
  .nested-link::before { content: '\2192'; color: var(--muted); }
  .ins-empty {
    color: var(--muted); font-style: italic;
    padding: 20px 12px; text-align: center; font-size: 12px;
  }
</style>
</head>
<body>

<header>
  <h1>betl pipeline viewer &middot; <span class="name" id="pkgName">&mdash;</span></h1>
  <span class="pathcrumb" id="pathCrumb"></span>
  <div class="spacer"></div>
  <button class="btn" id="browseBtn" title="Browse server files">browse&hellip;</button>
  <button class="btn" id="newBtn" title="Create a new YAML">new</button>
  <button class="btn" id="saveBtn" title="Save (Ctrl+S)">save</button>
  <button class="btn" id="darkBtn" title="Toggle dark mode" aria-label="dark mode">&#9789;</button>
  <div class="toggle" id="layoutToggle">
    <button data-layout="ribbon" class="active">Ribbon</button>
    <button data-layout="detail">Master-detail</button>
    <button data-layout="kanban">Kanban</button>
    <button data-layout="flow">Flow</button>
  </div>
</header>

<main id="stage"></main>
<div class="modal" id="modal">
  <div class="modal-card">
    <div class="modal-head">
      <h3 id="modalTitle">&mdash;</h3>
      <button class="close" id="modalClose" aria-label="close">&times;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-foot" id="modalFoot"></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<aside class="inspector" id="inspector">
  <div class="ins-head">
    <div class="crumb" id="inspectorCrumb"></div>
    <button class="close" id="inspectorClose" aria-label="close inspector">&times;</button>
  </div>
  <div class="ins-body" id="inspectorBody"></div>
  <div class="ins-foot">
    <button class="btn" id="inspectorDiscard">Discard</button>
    <button class="btn primary" id="inspectorApply">Apply</button>
  </div>
</aside>


<script>
'use strict';

/* -------------------------------------------------------------------------
 * Data model
 *
 * Pipeline = { name: string, steps: Step[] }
 * Step     = { id, type, after?: string[], steps?: Step[], kind, ...rest }
 *
 * `kind` is a coarse bucket for styling (container | dataflow | sql | map |
 * script | leaf), derived from `type`. The original `type` is preserved.
 * ----------------------------------------------------------------------- */

function classifyType(t) {
  if (!t) return 'leaf';
  const s = String(t).toLowerCase();
  if (s === 'container' || s === 'sequence' || s === 'foreach') return 'container';
  if (s === 'dataflow') return 'dataflow';
  if (s.startsWith('mssql') || s.startsWith('postgres') || s.startsWith('sql')) return 'sql';
  if (s === 'map' || s === 'filter' || s === 'sort' || s === 'union' ||
      s === 'multicast' || s === 'aggregate' || s === 'join' ||
      s === 'conditional_split' || s === 'pivot') return 'map';
  if (s.startsWith('dotnet') || s.includes('script')) return 'script';
  return 'leaf';
}

/* decorateStep mutates the parsed YAML object in place, adding `kind` for
 * styling. The returned pipeline view shares object identity with rawDoc,
 * so edits made through the inspector flow back to the doc for save. */
function decorateStep(s) {
  if (!s || typeof s !== 'object') return;
  s.kind = classifyType(s.type);
  if (Array.isArray(s.steps)) s.steps.forEach(decorateStep);
}

function buildPipelineView(doc) {
  if (!doc || typeof doc !== 'object') return { name: '(empty)', steps: [] };
  if (!Array.isArray(doc.pipeline)) doc.pipeline = [];
  doc.pipeline.forEach(decorateStep);
  return { name: doc.name || '(unnamed)', steps: doc.pipeline };
}

/* Recursively strip the UI-only `kind` field before serializing back. */
function stripKind(node) {
  if (Array.isArray(node)) { node.forEach(stripKind); return; }
  if (!node || typeof node !== 'object') return;
  delete node.kind;
  for (const k of Object.keys(node)) stripKind(node[k]);
}

/* -------------------------------------------------------------------------
 * Tiny HTML helpers
 * ----------------------------------------------------------------------- */

function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, (c) => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

function describe(step) {
  const n = step.steps ? step.steps.length : 0;
  const after = step.after && step.after.length
    ? ` &middot; ← ${step.after.map(esc).join(', ')}`
    : '';
  return `${n} ${n === 1 ? 'child' : 'children'}${after}`;
}

/* Collect the from-specs that feed this step. Each spec is the raw
 * string from YAML: either a bare step id ("read") or a port ref
 * ("route:new"). De-duped on the full spec so two refs to the exact
 * same port collapse, while "route:new" and "route:changed" stay
 * separate (they're different output streams). */
function collectFromIds(from) {
  const items = Array.isArray(from) ? from : (from == null ? [] : [from]);
  const seen = new Set();
  const out = [];
  for (const x of items) {
    if (typeof x !== 'string' || !x) continue;
    if (!seen.has(x)) { seen.add(x); out.push(x); }
  }
  return out;
}

function parseFromSpec(spec) {
  const i = spec.indexOf(':');
  return i < 0
    ? { srcId: spec, port: '' }
    : { srcId: spec.slice(0, i), port: spec.slice(i + 1) };
}

function stepCard(step, path) {
  const kind = step.kind || 'leaf';
  const innerCount = step.steps && step.steps.length
    ? `<span class="badge">${step.steps.length} steps</span>`
    : '';
  const after = step.after && step.after.length
    ? `<span class="after">${step.after.map(esc).join(', ')}</span>`
    : '';
  const pathAttr = path != null ? ` data-path="${esc(path)}"` : '';
  const idAttr = step.id != null ? ` data-id="${esc(step.id)}"` : '';
  // Comma-joined list of plain source ids. Port refs (`a:errors`)
  // are filtered out — they're handled in a later pass.
  const fromIds = collectFromIds(step.from);
  const fromAttr = fromIds.length
    ? ` data-from="${esc(fromIds.join(','))}"`
    : '';
  return `<div class="step k-${kind}"${pathAttr}${idAttr}${fromAttr} role="button" tabindex="0">
    <span class="id">${esc(step.id)}</span>
    <span class="ttype">${esc(step.type || '')}</span>
    ${after}
    ${innerCount}
  </div>`;
}

/* -------------------------------------------------------------------------
 * Template sets - three layouts, one data model.
 *
 * Each template set exposes a single `render(pipeline, ctx)` entry point.
 * Templates share `stepCard` for individual rows so leaves look the same
 * everywhere; the differences are in how containers are composed.
 * ----------------------------------------------------------------------- */

const templates = {

  /* ---- 1. Ribbon: long page of horizontal sections ---- */
  ribbon: {
    name: 'Ribbon',
    render(pipeline) {
      return `<div class="v-ribbon">
        ${pipeline.steps.map((s, i) => this.section(s, i)).join('')}
      </div>`;
    },
    section(step, i) {
      const children = step.steps && step.steps.length
        ? `<div class="children">${step.steps.map((c, j) => stepCard(c, `${i},${j}`)).join('')}</div>`
        : `<div class="empty">no children</div>`;
      const after = step.after && step.after.length
        ? `<span class="after-tag">${step.after.map(esc).join(', ')}</span>`
        : '';
      return `<section>
        <div class="section-head k-${step.kind || 'leaf'}" data-path="${i}" role="button" tabindex="0">
          <span class="id">${esc(step.id)}</span>
          <span class="meta">${esc(step.type || '')}</span>
          <span class="meta">${(step.steps || []).length} children</span>
          ${after}
        </div>
        ${children}
      </section>`;
    },
  },

  /* ---- 2. Master-detail: left rail + focused pane ---- */
  detail: {
    name: 'Master-detail',
    render(pipeline, ctx) {
      const sel = Math.min(ctx.selected || 0, Math.max(0, pipeline.steps.length - 1));
      const railItems = pipeline.steps.map((s, i) => {
        const cls = i === sel ? 'rail-item active' : 'rail-item';
        const n = s.steps ? s.steps.length : 0;
        return `<div class="${cls}" data-i="${i}">
          <span>${esc(s.id)}</span>
          <span class="count">${n}</span>
        </div>`;
      }).join('');

      const cur = pipeline.steps[sel];
      const paneBody = cur ? this.pane(cur, sel) : `<div class="empty">no pipeline</div>`;

      return `<div class="v-detail">
        <div class="rail">${railItems}</div>
        <div class="pane">${paneBody}</div>
      </div>`;
    },
    pane(step, i) {
      const childRows = (step.steps || []).map((c, j) => {
        if (c.kind === 'dataflow' && c.steps && c.steps.length) {
          const inner = c.steps.map((g, k) => stepCard(g, `${i},${j},${k}`)).join('');
          return stepCard(c, `${i},${j}`) + `<div class="dataflow-children">${inner}</div>`;
        }
        return stepCard(c, `${i},${j}`);
      }).join('');
      const after = step.after && step.after.length
        ? ` &middot; ← ${step.after.map(esc).join(', ')}`
        : '';
      const n = step.steps ? step.steps.length : 0;
      return `<div class="pane-head k-${step.kind || 'leaf'}" data-path="${i}" role="button" tabindex="0">
          <div class="id">${esc(step.id)}</div>
          <div class="meta">${esc(step.type || '')} &middot; ${n} children${after}</div>
        </div>
        <div class="pane-children">${childRows || '<div class="empty">no children</div>'}</div>`;
    },
  },

  /* ---- 3. Kanban: top-level steps as columns ---- */
  kanban: {
    name: 'Kanban',
    render(pipeline) {
      return `<div class="v-kanban">
        ${pipeline.steps.map((s, i) => this.column(s, i)).join('')}
      </div>`;
    },
    column(step, i) {
      const children = step.steps && step.steps.length
        ? step.steps.map((c, j) => stepCard(c, `${i},${j}`)).join('')
        : `<div class="empty">no children</div>`;
      const after = step.after && step.after.length
        ? `<div class="after-tag">${step.after.map(esc).join(', ')}</div>`
        : '';
      const n = step.steps ? step.steps.length : 0;
      return `<div class="col">
        <div class="col-head k-${step.kind || 'leaf'}" data-path="${i}" role="button" tabindex="0">
          <div class="id">${esc(step.id)}</div>
          <div class="meta">${esc(step.type || '')} &middot; ${n} children</div>
          ${after}
        </div>
        <div class="col-children">${children}</div>
      </div>`;
    },
  },

  /* ---- 4. Flow: dagre auto-layout per top-level dataflow ---- */
  flow: {
    name: 'Flow',
    render(pipeline) {
      return `<div class="v-flow">
        ${pipeline.steps.map((s, i) => this.section(s, i)).join('')}
      </div>`;
    },
    section(step, i) {
      const hasChildren = step.steps && step.steps.length;
      const body = hasChildren
        ? `<div class="flow-canvas">${step.steps.map((c, j) => stepCard(c, `${i},${j}`)).join('')}</div>`
        : `<div class="empty">no children</div>`;
      return `<section class="flow-section">
        <div class="flow-head k-${step.kind || 'leaf'}" data-path="${i}" role="button" tabindex="0">
          <span class="id">${esc(step.id)}</span>
          <span class="meta">${esc(step.type || '')}</span>
          <span class="meta">${(step.steps || []).length} children</span>
        </div>
        ${body}
      </section>`;
    },
  },
};

/* -------------------------------------------------------------------------
 * App state + wiring
 * ----------------------------------------------------------------------- */

const state = {
  pipeline: { name: '(none)', steps: [] },
  rawDoc: null,          // full parsed YAML doc; pipeline.steps share identity
  layout: 'ribbon',
  selected: 0,
  selectedPath: null,    // comma-joined indices of the inspected step
  currentPath: null,     // server-relative path of the loaded file
  currentText: '',       // raw YAML text last loaded/saved
  dirty: false,          // edits since last save
  hasComments: false,
};

const stage     = document.getElementById('stage');
const pkgName   = document.getElementById('pkgName');
const pathCrumb = document.getElementById('pathCrumb');

function render() {
  pkgName.textContent = state.pipeline.name;
  const tag = state.currentPath ? '@ ' + state.currentPath : '';
  pathCrumb.innerHTML = tag + (state.dirty ? ' <span class="dirty"></span>' : '');
  const tpl = templates[state.layout];
  stage.innerHTML = tpl.render(state.pipeline, state);
  if (state.layout === 'detail') {
    stage.querySelectorAll('.rail-item').forEach((el) => {
      el.addEventListener('click', () => {
        state.selected = parseInt(el.dataset.i, 10) || 0;
        render();
      });
    });
  }
  if (state.selectedPath != null) {
    stage.querySelectorAll(`[data-path="${state.selectedPath}"]`)
      .forEach(el => el.classList.add('selected'));
  }
  // Arrows are absolute-positioned inside each child container; layout
  // must settle first so getBoundingClientRect() returns final geometry.
  requestAnimationFrame(state.layout === 'flow' ? applyFlowLayout : drawConnections);
}

const SVG_NS = 'http://www.w3.org/2000/svg';

function drawConnections() {
  const groups = stage.querySelectorAll(
    '.v-ribbon .children, .v-detail .pane-children, .v-detail .dataflow-children, .v-kanban .col-children'
  );
  for (const g of groups) {
    const old = g.querySelector(':scope > svg.conns');
    if (old) old.remove();
    // Clear any previous pass's blocker shifts before recomputing.
    g.querySelectorAll(':scope > .step.blocker').forEach((c) => c.classList.remove('blocker'));

    const cards = Array.from(g.querySelectorAll(':scope > .step'));
    if (cards.length < 2) continue;
    const byId = new Map();
    cards.forEach((c, i) => {
      if (c.dataset.id) byId.set(c.dataset.id, { el: c, i });
    });
    const links = [];
    cards.forEach((c, i) => {
      if (!c.dataset.from) return;
      for (const spec of c.dataset.from.split(',')) {
        const { srcId } = parseFromSpec(spec);
        const src = byId.get(srcId);
        if (src && src.el !== c) {
          links.push({ src: src.el, srcIdx: src.i, tgt: c, tgtIdx: i });
        }
      }
    });
    if (!links.length) continue;

    // Vertical stack (kanban col / detail pane / inner dataflow) =>
    // bottom→top arrows. Ribbon's CSS grid => right→left arrows.
    const vertical = !g.classList.contains('children');

    // For vertical containers, every card sitting strictly between a
    // link's src and tgt indices is a blocker — shift it left so the
    // arrow's right-bulging curve has a clear lane.
    if (vertical) {
      for (const link of links) {
        const lo = Math.min(link.srcIdx, link.tgtIdx);
        const hi = Math.max(link.srcIdx, link.tgtIdx);
        if (hi - lo < 2) continue;
        for (let j = lo + 1; j < hi; j++) {
          cards[j].classList.add('blocker');
        }
      }
    }

    const cRect = g.getBoundingClientRect();
    const svg = document.createElementNS(SVG_NS, 'svg');
    svg.setAttribute('class', 'conns');
    svg.setAttribute('width', String(cRect.width));
    svg.setAttribute('height', String(cRect.height));

    for (const link of links) {
      const s = link.src.getBoundingClientRect();
      const t = link.tgt.getBoundingClientRect();
      let sx, sy, tx, ty;

      if (vertical) {
        // Pick the lane x that runs the line straight down. With no
        // blockers, use the midpoint of source and target centers. With
        // blockers, route just past the rightmost blocker edge so the
        // line passes through the cleared lane (.blocker shrinks them).
        const lo = Math.min(link.srcIdx, link.tgtIdx);
        const hi = Math.max(link.srcIdx, link.tgtIdx);
        let laneX;
        if (hi - lo < 2) {
          const sc = s.left + s.width / 2 - cRect.left;
          const tc = t.left + t.width / 2 - cRect.left;
          laneX = (sc + tc) / 2;
        } else {
          let maxRight = 0;
          for (let j = lo + 1; j < hi; j++) {
            const r = cards[j].getBoundingClientRect();
            const right = r.right - cRect.left;
            if (right > maxRight) maxRight = right;
          }
          laneX = maxRight + 10;
        }
        // Clamp so the endpoints sit on the source and target faces
        // (with a small inset from the corners).
        const sL = s.left - cRect.left, sR = s.right - cRect.left;
        const tL = t.left - cRect.left, tR = t.right - cRect.left;
        const pad = 6;
        const minX = Math.max(sL, tL) + pad;
        const maxX = Math.min(sR, tR) - pad;
        if (maxX >= minX) laneX = Math.max(minX, Math.min(maxX, laneX));

        const downward = link.tgtIdx > link.srcIdx;
        sx = laneX;
        tx = laneX;
        sy = (downward ? s.bottom : s.top) - cRect.top;
        ty = (downward ? t.top : t.bottom) - cRect.top;
      } else {
        // Ribbon: straight horizontal lines. Skip cross-row links — a
        // single horizontal segment can't bridge different rows, and
        // the user asked for axis-aligned segments only.
        if (Math.abs(s.top - t.top) > 6) continue;
        const cy = (s.top + s.bottom) / 2 - cRect.top;
        const forward = t.left >= s.right - 1;
        sx = (forward ? s.right : s.left) - cRect.left;
        tx = (forward ? t.left : t.right) - cRect.left;
        sy = cy;
        ty = cy;
      }

      // Back the line off by `back` px so the arrow head sits just
      // inside the target face instead of biting into it.
      const back = 6;
      const dx = tx - sx, dy = ty - sy;
      const len = Math.hypot(dx, dy) || 1;
      const ex = tx - (dx / len) * back;
      const ey = ty - (dy / len) * back;

      const path = document.createElementNS(SVG_NS, 'path');
      path.setAttribute('d', `M ${sx} ${sy} L ${ex} ${ey}`);
      svg.appendChild(path);

      // Arrow head triangle with tip at (tx, ty).
      const ang = Math.atan2(dy, dx);
      const ah = 6, al = 9;
      const baseX = tx - Math.cos(ang) * al;
      const baseY = ty - Math.sin(ang) * al;
      const lx = baseX + Math.cos(ang + Math.PI / 2) * ah;
      const ly = baseY + Math.sin(ang + Math.PI / 2) * ah;
      const rx = baseX - Math.cos(ang + Math.PI / 2) * ah;
      const ry = baseY - Math.sin(ang + Math.PI / 2) * ah;
      const head = document.createElementNS(SVG_NS, 'path');
      head.setAttribute('class', 'arrow-head');
      head.setAttribute('d', `M ${tx} ${ty} L ${lx} ${ly} L ${rx} ${ry} Z`);
      svg.appendChild(head);
    }
    g.appendChild(svg);
  }
}

let _redrawTimer = 0;
window.addEventListener('resize', () => {
  clearTimeout(_redrawTimer);
  _redrawTimer = setTimeout(() => {
    if (state.layout === 'flow') applyFlowLayout();
    else drawConnections();
  }, 80);
});

/* -------------------------------------------------------------------------
 * Flow layout: dagre computes positions for cards + edge waypoints; we
 * absolute-position the existing card HTML and draw SVG polylines along
 * dagre's routed paths. Cards keep their click-to-inspect, kind colors,
 * and badge content unchanged — dagre only owns geometry, not styling.
 * ----------------------------------------------------------------------- */

function applyFlowLayout() {
  if (typeof dagre === 'undefined') {
    console.warn('dagre not loaded; flow layout unavailable');
    return;
  }
  const canvases = stage.querySelectorAll('.v-flow .flow-canvas');
  for (const canvas of canvases) {
    canvas.querySelector(':scope > svg.conns')?.remove();

    const cards = Array.from(canvas.querySelectorAll(':scope > .step'));
    if (!cards.length) continue;

    // Reset any inline geometry from a previous pass so the cards fall
    // back to their inline-flex natural size for measurement.
    for (const c of cards) {
      c.style.position = '';
      c.style.left = '';
      c.style.top = '';
      c.style.width = '';
      c.style.height = '';
    }

    const sizes = cards.map((c) => {
      const r = c.getBoundingClientRect();
      return { w: Math.max(160, r.width), h: Math.max(30, r.height) };
    });

    // multigraph: true lets two ports from the same source land as
    // distinct edges on the same target (e.g. from: [route:new,
    // route:changed]) — otherwise the second setEdge would overwrite
    // the first.
    const G = new dagre.graphlib.Graph({ multigraph: true });
    G.setGraph({ rankdir: 'TB', nodesep: 28, ranksep: 44, marginx: 14, marginy: 14 });
    G.setDefaultEdgeLabel(() => ({}));

    cards.forEach((c, i) => {
      if (!c.dataset.id) return;
      G.setNode(c.dataset.id, { width: sizes[i].w, height: sizes[i].h, el: c });
    });
    cards.forEach((c) => {
      if (!c.dataset.id || !c.dataset.from) return;
      const tgtId = c.dataset.id;
      for (const spec of c.dataset.from.split(',')) {
        const { srcId, port } = parseFromSpec(spec);
        if (!G.hasNode(srcId) || srcId === tgtId) continue;
        // Reserve space for the port label inline along the edge so
        // dagre routes around it. width estimate is rough but works
        // for the 11px mono font the label uses.
        const labelOpts = port
          ? { label: port, width: port.length * 7 + 8, height: 16, labelpos: 'c' }
          : {};
        G.setEdge(srcId, tgtId, labelOpts, port || '_');
      }
    });

    dagre.layout(G);

    const gb = G.graph();
    canvas.style.width = (gb.width || 100) + 'px';
    canvas.style.height = (gb.height || 50) + 'px';

    for (const id of G.nodes()) {
      const n = G.node(id);
      if (!n.el) continue;
      n.el.style.position = 'absolute';
      n.el.style.left = (n.x - n.width / 2) + 'px';
      n.el.style.top = (n.y - n.height / 2) + 'px';
      n.el.style.width = n.width + 'px';
    }

    const svg = document.createElementNS(SVG_NS, 'svg');
    svg.setAttribute('class', 'conns');
    svg.setAttribute('width', String(gb.width || 100));
    svg.setAttribute('height', String(gb.height || 50));

    for (const e of G.edges()) {
      const edge = G.edge(e);
      const pts = edge.points;
      if (!pts || pts.length < 2) continue;
      const d = 'M ' + pts.map((p) => `${p.x} ${p.y}`).join(' L ');
      const path = document.createElementNS(SVG_NS, 'path');
      path.setAttribute('d', d);
      svg.appendChild(path);

      const pE = pts[pts.length - 1];
      const pP = pts[pts.length - 2];
      const ang = Math.atan2(pE.y - pP.y, pE.x - pP.x);
      const ah = 6, al = 9;
      const baseX = pE.x - Math.cos(ang) * al;
      const baseY = pE.y - Math.sin(ang) * al;
      const lx = baseX + Math.cos(ang + Math.PI / 2) * ah;
      const ly = baseY + Math.sin(ang + Math.PI / 2) * ah;
      const rx = baseX - Math.cos(ang + Math.PI / 2) * ah;
      const ry = baseY - Math.sin(ang + Math.PI / 2) * ah;
      const head = document.createElementNS(SVG_NS, 'path');
      head.setAttribute('class', 'arrow-head');
      head.setAttribute('d', `M ${pE.x} ${pE.y} L ${lx} ${ly} L ${rx} ${ry} Z`);
      svg.appendChild(head);

      // Port label, if this edge came from a port-ref. dagre wrote
      // x/y onto the edge object (it reserves space for the label
      // when laying out, so labels don't overlap routed segments).
      if (edge.label && edge.x != null) {
        const bgW = edge.width || (edge.label.length * 7 + 8);
        const bgH = edge.height || 16;
        const bg = document.createElementNS(SVG_NS, 'rect');
        bg.setAttribute('class', 'edge-label-bg');
        bg.setAttribute('x', edge.x - bgW / 2);
        bg.setAttribute('y', edge.y - bgH / 2);
        bg.setAttribute('width', bgW);
        bg.setAttribute('height', bgH);
        bg.setAttribute('rx', 3);
        svg.appendChild(bg);

        const text = document.createElementNS(SVG_NS, 'text');
        text.setAttribute('class', 'edge-label');
        text.setAttribute('x', edge.x);
        text.setAttribute('y', edge.y);
        text.setAttribute('text-anchor', 'middle');
        text.setAttribute('dominant-baseline', 'central');
        text.textContent = edge.label;
        svg.appendChild(text);
      }
    }
    canvas.appendChild(svg);
  }
}

/* step click → inspector */
stage.addEventListener('click', (e) => {
  const el = e.target.closest('[data-path]');
  if (!el || !stage.contains(el)) return;
  openInspector(el.dataset.path);
});
stage.addEventListener('keydown', (e) => {
  if (e.key !== 'Enter' && e.key !== ' ') return;
  const el = e.target.closest('[data-path]');
  if (!el) return;
  e.preventDefault();
  openInspector(el.dataset.path);
});

function stepAt(path) {
  if (path == null || path === '') return null;
  const parts = String(path).split(',').map(Number);
  let arr = state.rawDoc && state.rawDoc.pipeline;
  let cur = null;
  for (const idx of parts) {
    if (!Array.isArray(arr) || idx < 0 || idx >= arr.length) return null;
    cur = arr[idx];
    arr = cur && cur.steps;
  }
  return cur;
}

function loadYamlText(text, sourceName, serverPath) {
  let doc;
  try {
    doc = jsyaml.load(text);
  } catch (e) {
    toast('YAML parse error: ' + e.message, true);
    return;
  }
  state.rawDoc = (doc && typeof doc === 'object') ? doc : {};
  state.pipeline = buildPipelineView(state.rawDoc);
  state.selected = 0;
  state.currentText = text;
  state.currentPath = serverPath || null;
  state.dirty = false;
  state.selectedPath = null;
  state.hasComments = /^\s*#/m.test(text);
  if (sourceName && !state.pipeline.name) {
    state.pipeline.name = sourceName;
    state.rawDoc.name = sourceName;
  }
  closeInspector();
  render();
  if (state.hasComments) {
    toast('Note: comments in this file will be lost on save', true);
  }
}

/* ---------- toast ---------- */
const toastEl = document.getElementById('toast');
let toastTimer = 0;
function toast(msg, isErr) {
  toastEl.textContent = msg;
  toastEl.classList.toggle('err', !!isErr);
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2600);
}

/* ---------- modal ---------- */
const modal     = document.getElementById('modal');
const modalTitle= document.getElementById('modalTitle');
const modalBody = document.getElementById('modalBody');
const modalFoot = document.getElementById('modalFoot');
function openModal(title, bodyHtml, footHtml) {
  modalTitle.textContent = title;
  modalBody.innerHTML = bodyHtml || '';
  modalFoot.innerHTML = footHtml || '';
  modal.classList.add('show');
}
function closeModal() { modal.classList.remove('show'); }
document.getElementById('modalClose').addEventListener('click', closeModal);
modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (modal.classList.contains('show')) { closeModal(); return; }
    if (document.getElementById('inspector').classList.contains('show')) closeInspector();
  }
  if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 's') {
    e.preventDefault();
    saveCurrent();
  }
});

/* ---------- inspector ---------- */
const inspectorEl    = document.getElementById('inspector');
const inspectorBody  = document.getElementById('inspectorBody');
const inspectorCrumb = document.getElementById('inspectorCrumb');

const RESERVED_KEYS = new Set(['id', 'type', 'after', 'steps', 'kind']);

function openInspector(path) {
  const step = stepAt(path);
  if (!step) return;
  state.selectedPath = String(path);
  inspectorEl.classList.add('show');
  renderInspector();
  render();   /* refresh to highlight the selected card */
}

function closeInspector() {
  state.selectedPath = null;
  inspectorEl.classList.remove('show');
  inspectorBody.innerHTML = '';
  inspectorCrumb.innerHTML = '';
}

function pathCrumbHtml(path) {
  const parts = String(path).split(',').map(Number);
  const segs = [];
  let arr = state.rawDoc && state.rawDoc.pipeline;
  let cur = null;
  for (const idx of parts) {
    if (!Array.isArray(arr)) break;
    cur = arr[idx];
    if (!cur) break;
    segs.push(esc(cur.id || '?'));
    arr = cur.steps;
  }
  const tail = segs.pop() || '?';
  const head = segs.length ? segs.join('<span class="arrow">/</span>') + '<span class="arrow">/</span>' : '';
  return head + '<span class="tail">' + tail + '</span>';
}

function fieldEditor(key, val, opts) {
  opts = opts || {};
  const label = esc(key);
  const id = 'fld_' + key.replace(/[^\w]/g, '_');
  if (Array.isArray(val) && val.every(v => typeof v === 'string')) {
    return `<div class="field">
      <label for="${id}">${label} <span class="kindtag">list</span></label>
      <input id="${id}" data-key="${esc(key)}" data-kind="strlist" value="${esc(val.join(', '))}" spellcheck="false">
    </div>`;
  }
  if (val == null || typeof val === 'string' || typeof val === 'number' || typeof val === 'boolean') {
    const str = String(val == null ? '' : val);
    const tag = val == null ? 'unset' : typeof val;
    if (str.includes('\n') || str.length > 60) {
      const rows = Math.min(12, Math.max(3, str.split('\n').length + 1));
      return `<div class="field">
        <label for="${id}">${label} <span class="kindtag">${tag}</span></label>
        <textarea id="${id}" data-key="${esc(key)}" data-kind="text" rows="${rows}" spellcheck="false">${esc(str)}</textarea>
      </div>`;
    }
    return `<div class="field">
      <label for="${id}">${label} <span class="kindtag">${tag}</span></label>
      <input id="${id}" data-key="${esc(key)}" data-kind="text" value="${esc(str)}" spellcheck="false">
    </div>`;
  }
  /* complex value: YAML textarea */
  let dumped = '';
  try { dumped = jsyaml.dump(val, { lineWidth: 100, noRefs: true }).trimEnd(); } catch (_) {}
  const rows = Math.min(14, Math.max(3, dumped.split('\n').length + 1));
  return `<div class="field">
    <label for="${id}">${label} <span class="kindtag">yaml</span></label>
    <textarea id="${id}" data-key="${esc(key)}" data-kind="yaml" rows="${rows}" spellcheck="false">${esc(dumped)}</textarea>
  </div>`;
}

function renderInspector() {
  const step = stepAt(state.selectedPath);
  if (!step) { closeInspector(); return; }
  inspectorCrumb.innerHTML = pathCrumbHtml(state.selectedPath);

  /* Order: id, type, after first, then any extras alphabetical, then steps last. */
  const all = Object.keys(step).filter(k => k !== 'kind');
  const front = ['id', 'type', 'after'].filter(k => k in step);
  const extras = all.filter(k => !RESERVED_KEYS.has(k)).sort();
  const hasSteps = Array.isArray(step.steps) && step.steps.length > 0;

  const fieldsHtml = [...front, ...extras].map(k => fieldEditor(k, step[k])).join('');

  const nestedHtml = hasSteps
    ? `<div class="field">
         <label>steps <span class="kindtag">${step.steps.length} nested</span></label>
         <div class="nested-list">
           ${step.steps.map((s, j) => `
             <div class="nested-link" data-rel="${j}">
               <span class="nl-id">${esc(s.id || '?')}</span>
               <span class="nl-type">${esc(s.type || '')}</span>
             </div>`).join('')}
         </div>
       </div>`
    : '';

  inspectorBody.innerHTML = fieldsHtml + nestedHtml;

  /* drill-down: clicking a nested step opens it in the inspector */
  inspectorBody.querySelectorAll('.nested-link').forEach((el) => {
    el.addEventListener('click', () => {
      const rel = parseInt(el.dataset.rel, 10);
      openInspector(state.selectedPath + ',' + rel);
    });
  });
}

function applyInspector() {
  const step = stepAt(state.selectedPath);
  if (!step) return;
  const inputs = inspectorBody.querySelectorAll('[data-key]');
  const updates = [];
  for (const inp of inputs) {
    const k = inp.dataset.key;
    const kind = inp.dataset.kind;
    const v = inp.value;
    try {
      if (kind === 'strlist') {
        const arr = v.split(',').map(x => x.trim()).filter(Boolean);
        updates.push([k, arr.length ? arr : undefined]);
      } else if (kind === 'yaml') {
        if (v.trim() === '') updates.push([k, undefined]);
        else updates.push([k, jsyaml.load(v)]);
      } else {
        updates.push([k, v === '' ? undefined : v]);
      }
    } catch (e) {
      toast(`Apply failed at ${k}: ${e.message}`, true);
      return;
    }
  }
  let changed = false;
  for (const [k, v] of updates) {
    const prev = step[k];
    if (v === undefined) {
      if (k in step) { delete step[k]; changed = true; }
    } else {
      if (JSON.stringify(prev) !== JSON.stringify(v)) { step[k] = v; changed = true; }
    }
  }
  if (changed) {
    decorateStep(step);
    state.dirty = true;
    render();
    renderInspector();
    toast('Applied');
  } else {
    toast('No changes');
  }
}

document.getElementById('inspectorClose').addEventListener('click', closeInspector);
document.getElementById('inspectorApply').addEventListener('click', applyInspector);
document.getElementById('inspectorDiscard').addEventListener('click', () => {
  renderInspector();   /* re-render = revert input values to current model */
  toast('Discarded');
});

/* ---------- dark mode ---------- */
const darkBtn = document.getElementById('darkBtn');
function setDark(on) {
  document.body.classList.toggle('dark', on);
  darkBtn.innerHTML = on ? '&#9728;' : '&#9789;';  /* sun / crescent */
  try { localStorage.setItem('betl-yaml-ui-dark', on ? '1' : '0'); } catch (_) {}
}
setDark(
  (() => { try { return localStorage.getItem('betl-yaml-ui-dark') === '1'; } catch (_) { return false; } })()
);
darkBtn.addEventListener('click', () => setDark(!document.body.classList.contains('dark')));

/* ---------- server: browse / load / save / new ---------- */
function dirnameOf(p) {
  if (!p) return '';
  const i = p.lastIndexOf('/');
  return i < 0 ? '' : p.slice(0, i);
}

async function openBrowser(path) {
  path = path || '';
  let j;
  try {
    const r = await fetch('/api/list?path=' + encodeURIComponent(path));
    if (!r.ok) throw new Error('HTTP ' + r.status);
    j = await r.json();
  } catch (e) {
    toast('Browse failed: ' + e.message, true);
    return;
  }
  const upPath = path ? dirnameOf(path) : null;
  const upRow = upPath !== null
    ? `<div class="entry" data-kind="dir" data-path="${esc(upPath)}">
         <span class="icon">&#x21B0;</span><span class="name">..</span>
       </div>`
    : '';
  const dirRows = j.dirs.map((d) =>
    `<div class="entry" data-kind="dir" data-path="${esc(d.path)}">
       <span class="icon">&#128193;</span><span class="name">${esc(d.name)}</span>
     </div>`
  ).join('');
  const fileRows = j.files.map((f) =>
    `<div class="entry" data-kind="file" data-path="${esc(f.path)}">
       <span class="icon">&#128462;</span><span class="name">${esc(f.name)}</span>
       <span class="size">${f.size} B</span>
     </div>`
  ).join('');
  const where = j.path ? j.path : '<root>';
  const body = `
    <div class="bcrumb"><span class="root">root</span> / ${esc(where)}</div>
    <div class="entries">${upRow}${dirRows}${fileRows}
      ${(j.dirs.length + j.files.length === 0) ? '<div class="entry" style="color:var(--muted)">(empty)</div>' : ''}
    </div>`;
  openModal('Browse', body, `<button class="btn" onclick="closeModal()">Cancel</button>`);
  modalBody.querySelectorAll('.entry[data-kind="dir"]').forEach((el) =>
    el.addEventListener('click', () => openBrowser(el.dataset.path))
  );
  modalBody.querySelectorAll('.entry[data-kind="file"]').forEach((el) =>
    el.addEventListener('click', () => loadServerFile(el.dataset.path))
  );
}

async function loadServerFile(path) {
  try {
    const r = await fetch('/api/file?path=' + encodeURIComponent(path));
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const text = await r.text();
    closeModal();
    loadYamlText(text, path.split('/').pop().replace(/\.[^.]+$/, ''), path);
    toast('Loaded ' + path);
  } catch (e) {
    toast('Load failed: ' + e.message, true);
  }
}

async function writeServerFile(path, text) {
  const r = await fetch('/api/file?path=' + encodeURIComponent(path), {
    method: 'PUT',
    headers: { 'Content-Type': 'text/yaml' },
    body: text,
  });
  if (!r.ok) {
    const err = await r.text().catch(() => '');
    throw new Error('HTTP ' + r.status + (err ? ': ' + err : ''));
  }
  return r.json();
}

function openSaveAs(prefill) {
  if (state.dirty) state.currentText = serializeRawDoc();
  const initial = prefill || state.currentPath || 'untitled.yml';
  const body = `
    <div class="saveform">
      <label for="savePath">Save to (relative to server root):</label>
      <input id="savePath" type="text" value="${esc(initial)}" autocomplete="off" spellcheck="false">
      <div class="hint">Must end in <code>.yml</code> or <code>.yaml</code>. Parent dirs are created.</div>
      <div class="hint err" id="saveErr" style="display:none"></div>
    </div>`;
  openModal('Save as', body, `
    <button class="btn" onclick="closeModal()">Cancel</button>
    <button class="btn primary" id="saveConfirm">Save</button>
  `);
  const input = document.getElementById('savePath');
  const errEl = document.getElementById('saveErr');
  const doSave = async () => {
    const p = input.value.trim();
    if (!/\.(ya?ml)$/i.test(p)) {
      errEl.style.display = 'block';
      errEl.textContent = 'path must end in .yml or .yaml';
      return;
    }
    try {
      await writeServerFile(p, state.currentText);
      state.currentPath = p;
      state.dirty = false;
      closeModal();
      render();
      toast('Saved ' + p);
    } catch (e) {
      errEl.style.display = 'block';
      errEl.textContent = e.message;
    }
  };
  document.getElementById('saveConfirm').addEventListener('click', doSave);
  input.addEventListener('keydown', (e) => { if (e.key === 'Enter') doSave(); });
  input.focus();
  input.select();
}

function serializeRawDoc() {
  /* deep-clone so we can strip UI-only `kind` fields without mutating state */
  const clone = JSON.parse(JSON.stringify(state.rawDoc || {}));
  stripKind(clone);
  return jsyaml.dump(clone, { lineWidth: 120, noRefs: true });
}

async function saveCurrent() {
  if (!state.rawDoc) { toast('Nothing loaded', true); return; }
  if (state.dirty) state.currentText = serializeRawDoc();
  if (!state.currentPath) { openSaveAs(); return; }
  try {
    await writeServerFile(state.currentPath, state.currentText);
    state.dirty = false;
    render();
    toast('Saved ' + state.currentPath);
  } catch (e) {
    toast('Save failed: ' + e.message, true);
  }
}

function newPipeline() {
  const starter = 'betl: 1\nname: untitled\n\npipeline: []\n';
  loadYamlText(starter, 'untitled', null);
  toast('New pipeline (unsaved)');
}

document.getElementById('browseBtn').addEventListener('click', () => openBrowser(''));
document.getElementById('saveBtn').addEventListener('click', saveCurrent);
document.getElementById('newBtn').addEventListener('click', newPipeline);

/* layout toggle */
document.getElementById('layoutToggle').addEventListener('click', (e) => {
  const b = e.target.closest('button[data-layout]');
  if (!b) return;
  state.layout = b.dataset.layout;
  document.querySelectorAll('#layoutToggle button').forEach((x) => {
    x.classList.toggle('active', x === b);
  });
  render();
});

/* boot: render the empty state */
stage.innerHTML = `
  <div style="text-align:center; color:var(--muted); padding:60px 20px; font-family:var(--mono); font-size:13px;">
    no pipeline loaded
    <div style="margin-top:8px; font-size:12px;">use <b>browse&hellip;</b> to pick a YAML file</div>
  </div>`;
</script>
