# Bench shape A (1col): pure read path — no per-row transform.
# Counterpart to: ssis/packages/A-1col.dtsx (OLEDB Source → Row Count).
# Reads dbo.src_1col (100k BIGINT rows) and discards via count_rows.
betl: 1
name: bench-ssis-A-1col
connections:
  bench:
    type: mssql
    dsn: ${env.BETL_TEST_MSSQL_DSN}
pipeline:
  - id: copy
    type: dataflow
    steps:
      - id: source
        type: mssql.read
        connection: bench
        query: SELECT a FROM dbo.src_1col
        batch_size: 10000
      - id: sink
        type: betl.count_rows
        from: source
        expect: 100000
