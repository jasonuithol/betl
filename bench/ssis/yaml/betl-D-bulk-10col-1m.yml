# Bench shape D-bulk (10col, 1M rows): steady-state bulk-insert.
# This is the headline measurement — at 1M rows the per-batch RTT cost
# is amortised across thousands of inserts.
betl: 1
name: bench-ssis-D-bulk-10col-1m
connections:
  bench:
    type: mssql
    dsn: ${env.BETL_TEST_MSSQL_DSN}
pipeline:
  - id: copy
    type: dataflow
    steps:
      - id: source
        type: mssql.read
        connection: bench
        query: SELECT a,b,c,d,e,f,g,h,i,j FROM dbo.src_10col_1m
        batch_size: 10000
      - id: sink
        type: mssql.bulkinsert
        from: source
        connection: bench
        table: 'dbo.dst_10col_1m'
        batch_size: 1000
