# Bench shape E-bcp (1M × 10col): the steady-state native-BCP throughput.
# At 1M rows the TDS-level bulk-load frames amortise away basically
# everything except the actual server-side ingest cost.
betl: 1
name: bench-ssis-E-bcp-10col-1m
connections:
  bench:
    type: mssql
    dsn: ${env.BETL_TEST_MSSQL_DSN}
pipeline:
  - id: copy
    type: dataflow
    steps:
      - id: source
        type: mssql.read
        connection: bench
        query: SELECT a,b,c,d,e,f,g,h,i,j FROM dbo.src_10col_1m
        batch_size: 10000
      - id: sink
        type: mssql.bulkinsert
        from: source
        connection: bench
        table: 'dbo.dst_10col_1m'
        mode: bcp
        batch_size: 1000
