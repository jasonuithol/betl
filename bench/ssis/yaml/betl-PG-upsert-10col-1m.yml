# Bench shape PG-upsert (1M × 10col): row-by-row INSERT...ON CONFLICT.
# Expect this to be the slowest of the six: 1M individual PQexecPrepared
# calls.
betl: 1
name: bench-pg-upsert-10col-1m
connections:
  bench:
    type: postgres
    dsn: ${env.BETL_TEST_PG_BENCH_DSN}
pipeline:
  - id: copy
    type: dataflow
    steps:
      - id: source
        type: postgres.read
        connection: bench
        query: SELECT a,b,c,d,e,f,g,h,i,j FROM src_10col_1m
        batch_size: 10000
      - id: sink
        type: postgres.upsert
        from: source
        connection: bench
        table: dst_10col_1m
        key: [a]
