# Bench shape C-write (10col): same as C-write-1col but 10 BIGINTs.
# TRUNCATE dbo.dst_10col out-of-band between iterations.
betl: 1
name: bench-ssis-C-write-10col
connections:
  bench:
    type: mssql
    dsn: ${env.BETL_TEST_MSSQL_DSN}
pipeline:
  - id: copy
    type: dataflow
    steps:
      - id: source
        type: mssql.read
        connection: bench
        query: SELECT a,b,c,d,e,f,g,h,i,j FROM dbo.src_10col
        batch_size: 10000
      - id: sink
        type: mssql.upsert
        from: source
        connection: bench
        table: 'dbo.dst_10col'
        key: [a]
